  <div class="footer-container">
    <div class="footer-brand">
      <span class="footer-logo">🦐 Krillnotes</span>
      <p class="footer-tagline">{{ .Site.Params.tagline }}</p>
    </div>
    <div class="footer-links">
      <div class="footer-col">
        <h4>Product</h4>
        <a href="/#features">Features</a>
        <a href="{{ .Site.Params.github }}/releases">Download</a>
        <a href="{{ .Site.Params.github }}/blob/main/CHANGELOG.md">Changelog</a>
      </div>
      <div class="footer-col">
        <h4>Docs</h4>
        <a href="/docs/">Getting Started</a>

        <a href="/docs/scripting/">Scripting Guide</a>

      <div class="footer-col">

        <a href="{{ .Site.Params.github }}">GitHub</a>
        <a href="{{ .Site.Params.github }}/issues">Issues</a>
        <a href="{{ .Site.Params.github }}/discussions">Discussions</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>MIT License &middot; Made with 🧡 by the Krillnotes team</p>
      <div class="footer-krill-parade">
        <span class="krill-swim">🦐</span>
        <span class="krill-swim" style="animation-delay: 0.3s">🦐</span>
        <span class="krill-swim" style="animation-delay: 0.6s">🦐</span>
        <span class="krill-swim" style="animation-delay: 0.9s">🦐</span>
        <span class="krill-swim" style="animation-delay: 1.2s">🦐</span>

    </div>
  </div>
